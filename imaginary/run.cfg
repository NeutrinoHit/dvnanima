[manim]
pixel_width = 1080
pixel_height = 1920
frame_width = 9
frame_height = 16
frame_rate = 60
background_color = #000000
renderer = cairo ; set to opengl only if needed

[scene]
text_font = PT Sans
show_coords = 0
coord_font_size = 24
left_x_min = -1.0
left_x_max = 3.0
left_x_step = 1.0
left_y_min = -2.0
left_y_max = 2.0
left_y_step = 1.0
left_group_scale = 0.92
left_group_buff = 0.35
focus_center_y = -0.25
focus_left_scale = 1.02
focus_right_scale = 0.80
grid_stroke_width = 1.0
grid_stroke_opacity = 0.30
axis_stroke_width = 2.0
unit_circle_radius = 1.0
unit_circle_stroke_width = 2.0
unit_circle_stroke_opacity = 0.50
dot_radius = 0.11
dot_shadow = 1.5
start_label_tex = i
start_label_scale = 1.0
start_label_buff = 0.08
top_formula_tex = i^i=\exp(i\,\log i)
top_formula_scale = 0.90
top_formula_corner = UL
stage_caption_font_size = 32
stage_caption_buff = 0.15
stage1_caption = 1) Start: z = i
stage2_caption = 2) Log branches
stage3_caption = 3) x i and exp
winding_ns = 0,1,2
winding_label_scale = 0.70
winding_arc_radius_base = 1.06
winding_arc_radius_step = 0.14
winding_arc_stroke_width = 3.0
winding_arc_stroke_opacity = 0.80
winding_formula_tex = i=e^{i(\pi/2+2\pi n)}
winding_formula_scale = 0.72
winding_formula_buff = 0.18

log_u_min = -15
log_u_max = 1
log_u_step = 2
log_v_min = -8
log_v_max = 16
log_v_step = 2
log_grid_u_step = 1
log_grid_v_step = 1
right_group_scale = 0.62
right_group_buff = 0.35
log_title = Log-plane: u=Re Log z,  v=Im Log z
log_title_font_size = 26
log_title_buff = 0.15

branch_ns = -1,0,1,2
ladder_dot_radius = 0.06
branch_formula_tex = \log(i)=i(\pi/2+2\pi n)
branch_formula_scale = 0.70
branch_formula_buff = 0.20
halo_radius = 0.14
halo_stroke_width = 3.0
target_dot_radius = 0.06
rot_text = x i  -> rotate by 90 deg
exp_text = exp  -> positive real axis
side_text_font_size = 28
side_text_buff = 0.12
u_mark_radius = 0.07
u_mark_tex = -\pi/2
u_mark_scale = 0.75
u_mark_buff = 0.10
exp_dot_radius = 0.07
principal_dot_radius = 0.09

result_eq_tex = i^i=e^{-\pi/2}
result_eq_scale = 0.90
result_eq_buff = 0.15
principal_text = Principal branch
principal_text_font_size = 30
principal_text_buff = 0.12
value_decimals = 6
value_font_size = 36
ratio_text = Each next branch is about {ratio:.1f}x smaller
ratio_font_size = 28
ratio_buff = 0.15
show_zero_zoom = 1
zero_zoom_scale = 1.55
zero_zoom_time = 1.0
show_hint = 1
hint_text = Other branches: e^{-pi/2-2pi n} are real and positive.
hint_font_size = 26
hint_bottom_buff = 0.35
nonprincipal_opacity = 0.42
others_lag_ratio = 0.16

intro_time = 1.2
title_time = 0.6
transition_time = 0.8
winding_time = 1.4
matchcut_time = 1.0
right_intro_time = 0.8
ladder_time = 0.9
branch_formula_time = 0.6
halo_time = 0.35
rotate_text_time = 0.4
rotate_time = 1.2
u_mark_time = 0.6
exp_text_time = 0.4
exp_dots_time = 0.9
principal_move_time = 0.9
flash_time = 0.9
result_time = 0.7
hint_time = 0.6
stage_pause = 0.2
final_wait = 2.8
flash_line_length = 0.18
flash_radius = 0.35

[colors]
text_col = #FFFFFF
label_col = #FFD166
grid_col = #4D6BFF
axis_col = #FFFFFF
circle_col = #7AA6FF
dot_col = #FF4D4D
ladder_col = #7AA6FF
target_col = #FF4D4D
branch_col = #7AA6FF
value_col = #FFD166
flash_col = #FFD166
principal_col = #FF4D4D
